{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Login</h1>
        <p class="page-subtitle">Welcome back to SmartToDo.</p>
    </div>
</div>

<div class="form-card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="btn" type="submit">Login</button>
    </form>

    <p class="meta">
        No account yet?
        <a href="{% url 'register' %}">Register</a>
    </p>
</div>
{% endblock %}
