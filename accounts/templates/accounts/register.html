{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Create account</h1>
        <p class="page-subtitle">Start organizing your tasks with SmartToDo.</p>
    </div>
</div>

<div class="form-card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="btn" type="submit">Register</button>
    </form>

    <p class="meta">
        Already have an account?
        <a href="{% url 'login' %}">Login</a>
    </p>
</div>
{% endblock %}
